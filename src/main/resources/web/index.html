<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surez's Quest Editor</title>
  <link rel="stylesheet" href="/pico.min.css">
  <style>
    :root {
      color-scheme: light;
      --bg-main: #e8edf2;
      --bg-sidebar: rgba(232,237,242,0.55);
      --bg-card: rgba(255,255,255,0.70);
      --accent: #3b82c4;
      --accent-hover: #5b9ad4;
      --text: #1a1d23;
      --text-dim: #687180;
      --border: rgba(0,0,0,0.06);
      --success: #4a9e6f;
      --danger: #d14343;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-input: 0 1px 2px rgba(0,0,0,0.04);
      --pico-primary: #3b82c4;
      --pico-primary-hover: #5b9ad4;
      --pico-primary-focus: rgba(59,130,196,0.25);
      --pico-primary-background: #3b82c4;
      --pico-primary-border: #3b82c4;
      --pico-primary-inverse: #ffffff;
      --pico-primary-text: #ffffff;
      --pico-primary-underline: rgba(59,130,196,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-main);
      background-image: radial-gradient(ellipse at 50% 0%, rgba(59,130,196,0.08) 0%, transparent 60%);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* override Pico max-width */
    body > header, body > main, body > footer {
      max-width: none;
    }

    /* ── header ──────────────────────────── */
    header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    header nav { display: flex; gap: 4px; }
    header nav button {
      background: none;
      border: none;
      color: var(--text-dim);
      padding: 6px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }
    header nav button:hover { color: var(--text); background: rgba(59,130,196,0.08); }
    header nav button.active {
      color: var(--accent);
      background: rgba(59,130,196,0.1);
      font-weight: 600;
    }

    /* ── layout ──────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── sidebar ─────────────────────────── */
    aside {
      width: 220px;
      background: var(--bg-sidebar);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      overflow-y: auto;
      padding: 8px 0;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
    }
    aside .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 8px 16px;
      font-size: 0.85rem;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, transform 0.15s;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards;
      border-radius: 6px;
      margin: 1px 6px;
      width: calc(100% - 12px);
    }
    aside .sidebar-item:hover {
      color: var(--text);
      background: rgba(59,130,196,0.06);
      transform: translateX(2px);
    }
    aside .sidebar-item.active {
      color: var(--accent);
      background: rgba(59,130,196,0.1);
      font-weight: 600;
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── main area ───────────────────────── */
    main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: transparent;
    }
    main .breadcrumb {
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 14px;
      padding: 4px 10px;
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 8px;
      display: inline-block;
    }
    main textarea {
      width: 100%;
      min-height: 500px;
      background: rgba(255,255,255,0.75);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 14px;
      line-height: 1.6;
      tab-size: 2;
      resize: vertical;
      outline: none;
      box-shadow: var(--shadow-card);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    main textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,196,0.1); }

    main pre {
      background: rgba(255,255,255,0.75);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      overflow-x: auto;
      box-shadow: var(--shadow-card);
    }

    .toolbar { display: flex; align-items: center; margin-top: 14px; gap: 12px; }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 6px rgba(59,130,196,0.25);
    }
    .btn-save:hover { background: var(--accent-hover); box-shadow: 0 3px 10px rgba(59,130,196,0.35); }
    .btn-save:active { animation: pulse 0.3s ease; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .save-msg { font-size: 0.85rem; }
    .save-msg.ok { color: var(--success); }
    .save-msg.err { color: var(--danger); }

    /* ── form ──────────────────────────── */
    .form-section {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin: 0 0 10px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .form-section label { display: block; margin-bottom: 4px; font-size: 0.82rem; }
    .form-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .form-label { width: 120px; flex-shrink: 0; text-align: right; color: var(--text-dim); font-size: 0.78rem; }
    .form-row input, .form-row select { flex: 1; min-width: 0; }
    .form-row textarea { flex: 1; min-width: 0; height: auto; min-height: unset; }
    .form-section .radio-group, .form-section .flag-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-section .radio-group label, .form-section .flag-group label { display: flex; align-items: center; gap: 4px; font-size: 0.82rem; }
    .form-section .obj-row, .form-section .rew-row { margin-bottom: 4px; }
    .form-section input:not([type="radio"]):not([type="checkbox"]),
    .form-section select,
    .form-section textarea {
      background: rgba(255,255,255,0.85);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      box-shadow: var(--shadow-input);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-section input:not([type="radio"]):not([type="checkbox"]):focus,
    .form-section select:focus,
    .form-section textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,196,0.12);
      outline: none;
    }
    .form-section input[readonly]:not([type="radio"]):not([type="checkbox"]) { opacity: 0.5; cursor: default; background: rgba(0,0,0,0.02); }
    .obj-row, .rew-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .obj-row select, .rew-row select { width: 140px; flex-shrink: 0; }
    .obj-row input, .rew-row input { width: 120px; }
    .obj-row input[type="number"], .rew-row input[type="number"] { width: 70px; }
    .checkbox-grid { display: flex; flex-wrap: wrap; gap: 8px 16px; }
    .checkbox-grid label { display: flex; align-items: center; gap: 4px; font-size: 0.82rem; }
    #prereq-select { flex: 1; min-width: 200px; }
    .prereq-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      font-size: 0.82rem;
    }
    .prereq-row span { flex: 1; }
    .btn-add {
      background: none;
      color: var(--accent);
      border: 1px dashed var(--border);
      padding: 6px 14px;
      font-size: 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-add:hover { border-color: var(--accent); background: rgba(212,168,83,0.06); }
    .rew-icon-wrap { display: none; }
    .rew-icon-wrap.show { display: inline; }
    .rew-icon-wrap input { width: 100px !important; }
    .btn-icon-toggle {
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .btn-icon-toggle:hover { border-color: var(--accent); color: var(--accent); background: rgba(59,130,196,0.06); }
    .btn-del {
      margin-left: auto;
      width: 24px; height: 24px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      color: var(--danger);
      font-size: 0.9rem;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      padding: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-del:hover { background: rgba(209,67,67,0.1); border-color: var(--danger); }
    .btn-raw {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 8px 16px;
      font-size: 0.85rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-raw:hover { background: rgba(255,255,255,0.85); color: var(--text); border-color: var(--accent); }
    #prereq-select { flex: 1; min-width: 200px; }
    .prereq-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      padding: 4px 10px;
      background: rgba(59,130,196,0.06);
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .prereq-row span { flex: 1; }
    .btn-add {
      background: rgba(255,255,255,0.7);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 6px 14px;
      font-size: 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-add:hover { background: rgba(59,130,196,0.08); }
    .btn-add:disabled { opacity: 0.4; cursor: default; }
    @media (max-width: 640px) {
      .obj-row, .rew-row { flex-direction: column; align-items: stretch; }
      .obj-row select, .rew-row select { width: 100%; }
    }

    .empty-state {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      aside {
        width: 100%;
        max-height: 140px;
        overflow-y: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        background: rgba(255,255,255,0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      main { padding: 12px; }
      main textarea { min-height: 300px; font-size: 13px; }
      header { backdrop-filter: blur(16px); }
    }
  </style>
</head>
<body>

<header>
  <h1>Surez's Quest Editor</h1>
  <nav>
    <button id="tab-quests" class="active" onclick="switchTab('quests')">Quests</button>
    <button id="tab-npcs" onclick="switchTab('npcs')">NPCs</button>
  </nav>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main id="editor-area">
    <p class="empty-state">Select a quest from the sidebar to edit.</p>
  </main>
</div>

<script src="/app.js"></script>
<script src="/forms.js"></script>
</body>
</html>
